[flake8]
max-line-length = 100
exclude =
    .git,
    .venv,
    venv,
    __pycache__,
    *.egg-info

# Ignora erros compatíveis com Black
extend-ignore =
    E203,   # espaço antes de ':'  (Black usa isso)
    E501,   # linha longa          (Black controla isso)
    W503,   # quebra de linha      (estilo Black)
    E704    # statement em uma linha

per-file-ignores =
    # __init__.py podem ter imports não usados
    __init__.py: F401
