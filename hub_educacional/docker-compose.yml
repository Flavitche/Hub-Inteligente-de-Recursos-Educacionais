version: "3.9"

services:

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: hub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hub_educacional}
      POSTGRES_USER:     ${POSTGRES_USER:-hub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hub_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hub_user} -d ${POSTGRES_DB:-hub_educacional}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hub_network

  #  Backend FastAPI 
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: hub_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-hub_user}:${POSTGRES_PASSWORD:-hub_secret}@db:5432/${POSTGRES_DB:-hub_educacional}
      GROQ_API_KEY:      ${GROQ_API_KEY}
      GROQ_MODEL:        ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_MAX_TOKENS:   ${GROQ_MAX_TOKENS:-512}
      GROQ_TEMPERATURE:  ${GROQ_TEMPERATURE:-0.4}
      ENVIRONMENT:       ${ENVIRONMENT:-production}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS:-["http://localhost:5173"]}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hub_network

volumes:
  postgres_data:
    driver: local

networks:
  hub_network:
    driver: bridge