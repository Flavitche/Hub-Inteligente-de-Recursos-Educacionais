name: CI — Lint & Quality Check

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-quality:
    name: 🔍 Linter + Formatação + Segurança
    runs-on: ubuntu-latest

    steps:
      #  1. Checkout do código
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura Python 3.11 
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instala dependências 
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 isort bandit

      #  4. Black — verifica formatação 
      - name: 🎨 Black — Verificar formatação
        run: |
          black --check --diff app/

      #  5. isort — verifica ordem dos imports
      - name: 📋 isort — Verificar ordem dos imports
        run: |
          isort --check-only --diff app/

      # 6. Flake8 — verifica erros e estilo 
      - name: 🔎 Flake8 — Linter de estilo e erros
        run: |
          flake8 app/

      #  7. Bandit — verifica vulnerabilidades de segurança 
      - name: 🔐 Bandit — Segurança do código
        run: |
          bandit -r app/ -ll

  test:
    name: 🧪 Testes Automatizados
    runs-on: ubuntu-latest
    needs: lint-and-quality

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: sqlite:///./test.db
      ENVIRONMENT: development
      LOG_LEVEL: WARNING
      GROQ_MODEL: llama-3.3-70b-versatile

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: 🧪 Rodar testes
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true  # não falha o pipeline se não houver testes ainda