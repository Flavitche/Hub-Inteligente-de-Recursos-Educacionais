name: CI — Lint & Quality Check

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-quality:
    name: 🔍 Linter + Formatação + Segurança
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r hub_educacional/requirements.txt
          pip install black flake8 isort bandit

      - name: 🎨 Black — Verificar formatação
        run: |
          black --check --diff hub_educacional/app/

      - name: 📋 isort — Verificar ordem dos imports
        run: |
          isort --check-only --diff hub_educacional/app/

      - name: 🔎 Flake8 — Linter de estilo e erros
        run: |
          flake8 hub_educacional/app/

      - name: 🔐 Bandit — Segurança do código
        run: |
          bandit -r hub_educacional/app/ -ll

  test:
    name: 🧪 Testes Automatizados
    runs-on: ubuntu-latest
    needs: lint-and-quality

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: sqlite:///./test.db
      ENVIRONMENT: development
      LOG_LEVEL: WARNING
      GROQ_MODEL: llama-3.3-70b-versatile

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r hub_educacional/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: 🧪 Rodar testes
        run: |
          cd hub_educacional
          pytest tests/ -v --tb=short
        continue-on-error: true